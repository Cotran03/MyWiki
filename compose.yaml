services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mywiki
      POSTGRES_USER: mywiki
      POSTGRES_PASSWORD: mywiki
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywiki -d mywiki"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres18-data:/var/lib/postgresql

volumes:
  postgres18-data:
