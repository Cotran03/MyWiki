{% extends "base.html" %}

{% block title %}서비스를 잠시 사용할 수 없습니다 — MyWiki{% endblock %}

{% block content %}

    <h1 class="h2">데이터베이스 연결을 확인하고 있습니다.</h1>
    <p class="text-body-secondary mt-3">

    </p>
    <a class="btn btn-primary mt-3" href="{{ url_for('main.index') }}">다시 시도</a>
</section>
{% endblock %}
