<!doctype html>
<html lang="ko">
  <body style="margin:0;background:#f5f7fc;color:#0b1739;font-family:Arial,'Apple SD Gothic Neo',sans-serif;">
    <div style="max-width:600px;margin:0 auto;padding:32px 20px;">
      <div style="background:#fffdf8;border:1px solid #d8e0ef;border-radius:16px;padding:32px;box-shadow:0 12px 32px rgba(5,18,71,.08);">
        <table role="presentation" style="border:0;border-spacing:0;margin-bottom:24px;">
          <tr>
            <td style="padding:0 12px 0 0;vertical-align:middle;">
              <img src="{{ brand_image_url }}" width="52" height="52" alt="" style="display:block;border:0;border-radius:13px;">
            </td>
            <td style="padding:0;vertical-align:middle;color:#051247;font-size:22px;font-weight:700;">MyWiki</td>
          </tr>
        </table>
        <p style="line-height:1.7;">안녕하세요, {{ display_name }}님.</p>
        <p style="line-height:1.7;">{{ explanation }}</p>
        <p style="margin:28px 0;">
          <a href="{{ action_url }}" style="display:inline-block;background:#1546ab;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:700;">
            {{ action_label }}
          </a>
        </p>
        <p style="font-size:13px;line-height:1.6;color:#52617a;word-break:break-all;">
          버튼이 열리지 않으면 다음 주소를 브라우저에 붙여 넣으세요.<br>
          {{ action_url }}
        </p>
        <p style="font-size:13px;line-height:1.6;color:#52617a;">
          본인이 요청하지 않았다면 이 메일을 무시해 주세요.
        </p>
      </div>
    </div>
  </body>
</html>
