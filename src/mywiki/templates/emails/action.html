<!doctype html>
<html lang="ko">
  <body style="margin:0;background:#f5f5f4;color:#292524;font-family:Arial,'Apple SD Gothic Neo',sans-serif;">
    <div style="max-width:600px;margin:0 auto;padding:32px 20px;">
      <div style="background:#ffffff;border:1px solid #e7e5e4;border-radius:16px;padding:32px;">
        <div style="font-size:22px;font-weight:700;margin-bottom:24px;">MyWiki</div>
        <p style="line-height:1.7;">안녕하세요, {{ display_name }}님.</p>
        <p style="line-height:1.7;">{{ explanation }}</p>
        <p style="margin:28px 0;">
          <a href="{{ action_url }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:700;">
            {{ action_label }}
          </a>
        </p>
        <p style="font-size:13px;line-height:1.6;color:#78716c;word-break:break-all;">
          버튼이 열리지 않으면 다음 주소를 브라우저에 붙여 넣으세요.<br>
          {{ action_url }}
        </p>
        <p style="font-size:13px;line-height:1.6;color:#78716c;">
          본인이 요청하지 않았다면 이 메일을 무시해 주세요.
        </p>
      </div>
    </div>
  </body>
</html>
