{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-stack" aria-label="알림">
            {% for category, message in messages %}
                <div
                    class="alert alert-{{ category }} alert-dismissible fade show shadow-sm"
                    role="{% if category == 'danger' %}alert{% else %}status{% endif %}"
                >
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="알림 닫기"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
